<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM — Dualmac Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --azul:#0066CC;
    --azul-e:#0099FF;
    --purpura:#9933FF;
    --naranja:#F39200;
    --bg:#060810;
    --bg2:#0d1117;
    --bg3:#141922;
    --borde:#1e2a3a;
    --texto:#e8eaf0;
    --gris:#8892a4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;}

  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
  .login-card{background:var(--bg3);border:1px solid var(--borde);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center;}
  .login-card img{height:40px;margin-bottom:24px;}
  .login-card h1{font-size:1.3rem;font-weight:700;margin-bottom:8px;}
  .login-card p{color:var(--gris);font-size:.85rem;margin-bottom:28px;}
  .login-card input{width:100%;background:#0a0f18;border:1px solid var(--borde);border-radius:8px;padding:12px 16px;color:var(--texto);font-family:'Montserrat',sans-serif;font-size:.9rem;margin-bottom:12px;outline:none;}
  .login-card input:focus{border-color:var(--azul-e);}
  .btn-login{width:100%;background:var(--naranja);color:#000;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:8px;padding:13px;cursor:pointer;}
  .login-error{color:#ff4d6d;font-size:.82rem;margin-top:10px;display:none;}

  /* APP */
  #app{display:none;}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--borde);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .topbar img{height:32px;}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .btn-logout{background:transparent;border:1px solid var(--borde);color:var(--gris);font-family:'Montserrat',sans-serif;font-size:.8rem;padding:6px 14px;border-radius:6px;cursor:pointer;}
  .btn-logout:hover{border-color:var(--azul-e);color:var(--azul-e);}

  .main{padding:28px;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
  .stat{background:var(--bg3);border:1px solid var(--borde);border-radius:12px;padding:20px;text-align:center;}
  .stat-num{font-size:1.9rem;font-weight:900;color:var(--naranja);}
  .stat-label{font-size:.75rem;color:var(--gris);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}

  /* TOOLBAR */
  .toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .toolbar input{background:var(--bg3);border:1px solid var(--borde);border-radius:8px;padding:9px 14px;color:var(--texto);font-family:'Montserrat',sans-serif;font-size:.85rem;outline:none;min-width:220px;}
  .toolbar input:focus{border-color:var(--azul-e);}
  .toolbar select{background:var(--bg3);border:1px solid var(--borde);border-radius:8px;padding:9px 14px;color:var(--texto);font-family:'Montserrat',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}
  .btn-export{background:var(--azul);color:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.82rem;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;margin-left:auto;}
  .btn-export:hover{background:var(--azul-e);}

  /* TABLE */
  .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--borde);}
  table{width:100%;border-collapse:collapse;font-size:.82rem;}
  thead{background:var(--bg3);}
  th{padding:12px 14px;text-align:left;color:var(--gris);font-weight:600;text-transform:uppercase;font-size:.72rem;letter-spacing:.06em;border-bottom:1px solid var(--borde);white-space:nowrap;}
  td{padding:11px 14px;border-bottom:1px solid var(--borde);vertical-align:top;max-width:200px;word-break:break-word;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
  .b-nuevo{background:rgba(0,153,255,.15);color:var(--azul-e);}
  .b-contactado{background:rgba(153,51,255,.15);color:var(--purpura);}
  .b-reunion{background:rgba(243,146,0,.15);color:var(--naranja);}
  .b-propuesta{background:rgba(0,102,204,.2);color:#66aaff;}
  .b-cerrado{background:rgba(0,200,100,.15);color:#00c864;}
  .b-perdido{background:rgba(255,50,50,.12);color:#ff5555;}

  .estado-select{background:var(--bg2);border:1px solid var(--borde);border-radius:6px;padding:4px 8px;color:var(--texto);font-family:'Montserrat',sans-serif;font-size:.78rem;cursor:pointer;outline:none;}
  .estado-select:focus{border-color:var(--azul-e);}

  .canal-badge{font-size:.7rem;background:rgba(255,255,255,.06);border-radius:4px;padding:2px 7px;color:var(--gris);}

  .empty{text-align:center;padding:60px 20px;color:var(--gris);}
  .empty p{margin-top:8px;font-size:.85rem;}

  .loading{text-align:center;padding:40px;color:var(--gris);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img src="logo.png" alt="Dualmac Studio" />
    <h1>Panel CRM</h1>
    <p>Acceso restringido al equipo Dualmac</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" />
    <button class="btn-login" onclick="login()">Ingresar</button>
    <p class="login-error" id="login-error">Contraseña incorrecta</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <img src="logo.png" alt="Dualmac Studio" />
    <div class="topbar-right">
      <span style="color:var(--gris);font-size:.8rem;" id="last-update"></span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Buscar por nombre, empresa o email..." oninput="renderTable()" />
      <select id="filter-estado" onchange="renderTable()">
        <option value="">Todos los estados</option>
        <option>Nuevo</option>
        <option>Contactado</option>
        <option>Reunión</option>
        <option>Propuesta</option>
        <option>Cerrado</option>
        <option>Perdido</option>
      </select>
      <select id="filter-rubro" onchange="renderTable()">
        <option value="">Todos los rubros</option>
        <option>Inmobiliaria</option>
        <option>Clínica / Estética</option>
        <option>Automotora</option>
        <option>Retail</option>
        <option>Servicios B2B</option>
        <option>Gastronomía</option>
        <option>Otro</option>
      </select>
      <button class="btn-export" onclick="exportCSV()">Exportar CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Nombre</th>
            <th>Empresa</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Rubro</th>
            <th>Presupuesto</th>
            <th>Ventas</th>
            <th>Canal</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const SB_URL = 'https://jogdohvmrjkqtkhmkuah.supabase.co';
  const SB_KEY = 'sb_publishable_om1yqroYf4zgIe4UmBW1bg_8Fu3mSN8';
  const PASSWORD = 'dualmac2026';

  let allLeads = [];

  function login() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadLeads();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  }

  async function loadLeads() {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="loading">Cargando leads...</td></tr>';
    const res = await fetch(`${SB_URL}/rest/v1/leads?order=created_at.desc`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    allLeads = await res.json();
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-CL');
    renderStats();
    renderTable();
  }

  function renderStats() {
    const total = allLeads.length;
    const nuevo = allLeads.filter(l => l.estado === 'Nuevo').length;
    const reunion = allLeads.filter(l => l.estado === 'Reunión').length;
    const cerrado = allLeads.filter(l => l.estado === 'Cerrado').length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total leads</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--azul-e)">${nuevo}</div><div class="stat-label">Nuevos</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--purpura)">${reunion}</div><div class="stat-label">Con reunión</div></div>
      <div class="stat"><div class="stat-num" style="color:#00c864">${cerrado}</div><div class="stat-label">Cerrados</div></div>
    `;
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const filtroEstado = document.getElementById('filter-estado').value;
    const filtroRubro = document.getElementById('filter-rubro').value;

    let leads = allLeads.filter(l => {
      const matchSearch = !search ||
        (l.nombre||'').toLowerCase().includes(search) ||
        (l.apellido||'').toLowerCase().includes(search) ||
        (l.empresa||'').toLowerCase().includes(search) ||
        (l.email||'').toLowerCase().includes(search);
      const matchEstado = !filtroEstado || l.estado === filtroEstado;
      const matchRubro = !filtroRubro || l.rubro === filtroRubro;
      return matchSearch && matchEstado && matchRubro;
    });

    const tbody = document.getElementById('tbody');
    if (!leads.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty"><strong>Sin resultados</strong><p>Prueba cambiando los filtros</p></td></tr>';
      return;
    }

    tbody.innerHTML = leads.map(l => {
      const fecha = l.created_at ? new Date(l.created_at).toLocaleDateString('es-CL') : '-';
      const badgeClass = { Nuevo:'b-nuevo', Contactado:'b-contactado', 'Reunión':'b-reunion', Propuesta:'b-propuesta', Cerrado:'b-cerrado', Perdido:'b-perdido' }[l.estado] || 'b-nuevo';
      return `<tr>
        <td style="white-space:nowrap;color:var(--gris)">${fecha}</td>
        <td><strong>${l.nombre||''} ${l.apellido||''}</strong></td>
        <td>${l.empresa||'-'}</td>
        <td>${l.telefono||'-'}</td>
        <td style="color:var(--azul-e)">${l.email||'-'}</td>
        <td>${l.rubro||'-'}</td>
        <td style="font-size:.75rem">${l.presupuesto||'-'}</td>
        <td style="font-size:.75rem">${l.ventas||'-'}</td>
        <td><span class="canal-badge">${l.canal||'landing'}</span></td>
        <td>
          <select class="estado-select" onchange="updateEstado('${l.id}', this.value)">
            ${['Nuevo','Contactado','Reunión','Propuesta','Cerrado','Perdido'].map(e =>
              `<option${l.estado===e?' selected':''}>${e}</option>`
            ).join('')}
          </select>
        </td>
      </tr>`;
    }).join('');
  }

  async function updateEstado(id, estado) {
    await fetch(`${SB_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=minimal' },
      body: JSON.stringify({ estado })
    });
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.estado = estado;
    renderStats();
  }

  function exportCSV() {
    const cols = ['created_at','nombre','apellido','email','telefono','empresa','instagram','rubro','ventas','presupuesto','canal','estado','proyecto'];
    const headers = ['Fecha','Nombre','Apellido','Email','Teléfono','Empresa','Instagram','Rubro','Ventas','Presupuesto','Canal','Estado','Proyecto'];
    const rows = [headers.join(',')];
    allLeads.forEach(l => {
      rows.push(cols.map(c => `"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','));
    });
    const blob = new Blob(['﻿'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dualmac-leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }
</script>
</body>
</html>
